name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  quality:
    runs-on: ${{ matrix.os }}
    env:
      PYTHONPATH: src
      QT_QPA_PLATFORM: offscreen
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
            run-lint: true
          - os: ubuntu-latest
            python-version: "3.11"
            run-lint: false
          - os: ubuntu-latest
            python-version: "3.12"
            run-lint: false
          - os: windows-latest
            python-version: "3.10"
            run-lint: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Linux runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev] twine
      - name: Environment Info
        run: |
          python -c "import os, sys; print('python', sys.version); print('executable', sys.executable); print('PYTHONPATH', os.environ.get('PYTHONPATH')); print('QT_QPA_PLATFORM', os.environ.get('QT_QPA_PLATFORM'))"
          python -c "import fitz, PySide6, pytest; print('PyMuPDF', fitz.__doc__.splitlines()[0]); print('PySide6', PySide6.__version__); print('pytest', pytest.__version__)"
      - name: Lint
        if: matrix.run-lint == true
        run: ruff check .
      - name: Tests
        run: python -m pytest -q
      - name: Build
        run: python -m build
      - name: Verify artifacts
        run: python -m twine check dist/*
