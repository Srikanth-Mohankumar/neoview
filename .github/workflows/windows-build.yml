name: Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]
      - name: Build exe
        run: |
          pyinstaller neoview.spec
      - name: Prepare release binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Copy-Item -Path dist/neoview.exe -Destination bin/neoview.exe -Force
          New-Item -ItemType Directory -Force -Path release/bin | Out-Null
          Copy-Item -Path bin/neoview.exe -Destination release/bin/neoview.exe -Force
          "NeoView Windows artifact" | Out-File -FilePath release/README.txt -Encoding utf8
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neoview-windows
          path: release/**
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/neoview.exe
